<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Mom!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-image: url('https://t4.ftcdn.net/jpg/15/68/97/83/360_F_1568978321_JVKyawq58nNqd9mekQ4EEvm8MraRvVHZ.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background 0.5s ease;
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.9); 
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            margin: 20px;
        }

        .surprise-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background-color: #ff4a75;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 74, 117, 0.4);
            transition: transform 0.2s, background-color 0.2s;
        }

        .surprise-btn:hover {
            background-color: #e03b63;
            transform: scale(1.05);
        }

        .birthday-message {
            display: none;
            font-size: 2.5rem;
            color: #d61c4e;
            font-weight: bold;
            animation: popIn 0.5s ease-out forwards;
        }

        .sub-text {
            font-size: 1.2rem;
            color: #333;
            margin-top: 15px;
            line-height: 1.6;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <button id="secretButton" class="surprise-btn">Skibidi toilet? 67?</button>

        <div id="birthdayGreeting" class="birthday-message">
            🎂 Happy Birthday, Nanay! 🎉
            <div class="sub-text">Thank you for being the best mom in the world! I promise I'll do my best everyday, both in school and in Ml :) May you have more birthdays and you come back here more often. I love you very most and miss you very most!❤️</div>
        </div>
    </div>
